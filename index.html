<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<title>Lil Taz Runner</title>

<meta
name="viewport"
content="width=device-width,height=device-height,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    touch-action:none;
}

#unity-container{
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

#unity-canvas{
    width:100%;
    height:100%;
    display:block;
    background:#000;
    outline:none;
}

/* ---------------- Loading Screen ---------------- */

#loading-screen{

    position:absolute;

    left:0;
    top:0;

    width:100%;
    height:100%;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    background:linear-gradient(#0a0a0a,#000);

    z-index:9999;
}

#loading-logo{

    font-size:54px;

    color:#00ffff;

    font-family:Arial;

    font-weight:bold;

    margin-bottom:60px;

    letter-spacing:5px;

    text-shadow:
        0 0 10px cyan,
        0 0 20px cyan,
        0 0 40px cyan;
}

#loading-bar{

    width:420px;

    max-width:80%;

    height:20px;

    background:#222;

    border-radius:30px;

    overflow:hidden;
}

#loading-fill{

    width:0%;

    height:100%;

    background:#00ffff;

    transition:width .15s;
}

#loading-percent{

    color:white;

    font-size:24px;

    font-family:Arial;

    margin-top:20px;
}

#loading-text{

    color:#cccccc;

    font-size:18px;

    margin-top:15px;

    font-family:Arial;
}

@media(max-width:768px){

#loading-logo{
    font-size:34px;
}

#loading-bar{
    width:280px;
}

#loading-percent{
    font-size:18px;
}

}

</style>

</head>

<body>

<div id="unity-container">

    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="loading-screen">

        <div id="loading-logo">
            LIL TAZ RUNNER
        </div>

        <div id="loading-bar">
            <div id="loading-fill"></div>
        </div>

        <div id="loading-percent">
            0%
        </div>

        <div id="loading-text">
            Loading...
        </div>

    </div>

</div>

<script>

const canvas=document.querySelector("#unity-canvas");

const buildUrl="Build";

const loaderUrl=buildUrl+"/9e4c0029f1a984faa0f151100328293e.loader.js";

const config={

    arguments:[],

    dataUrl:
    buildUrl+"/6407da22cfbb29a7b8399c237d264852.data.unityweb",

    frameworkUrl:
    buildUrl+"/739e84563b41c627d2729d83354daf37.framework.js.unityweb",

    codeUrl:
    buildUrl+"/1a44bdad9a3855b21c3652f9cc787373.wasm.unityweb",

    streamingAssetsUrl:"StreamingAssets",

    companyName:"DefaultCompany",

    productName:"LilTazRunner",

    productVersion:"1.0",

    devicePixelRatio:1
};

function resizeCanvas(){

    canvas.style.width=window.innerWidth+"px";
    canvas.style.height=window.innerHeight+"px";
}

resizeCanvas();

window.addEventListener("resize",resizeCanvas);

window.addEventListener("orientationchange",function(){

    setTimeout(resizeCanvas,300);

});

canvas.addEventListener("contextmenu",function(e){

    e.preventDefault();

});

document.body.addEventListener("touchmove",function(e){

    e.preventDefault();

},{passive:false});

const script=document.createElement("script");

script.src=loaderUrl;

script.onload=function(){

createUnityInstance(

canvas,

config,

function(progress){

progress=Math.floor(progress*100);

document.getElementById("loading-fill").style.width=progress+"%";

document.getElementById("loading-percent").innerHTML=progress+"%";

}

)

.then(function(unityInstance){

window.unityInstance=unityInstance;

document.getElementById("loading-screen").style.display="none";

})

.catch(function(message){

alert(message);

});

};

document.body.appendChild(script);

</script>

</body>
</html>
