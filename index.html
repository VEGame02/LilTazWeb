<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">

<title>Lil Taz Runner</title>

<meta
name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<style>

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    touch-action:none;
}

#unity-container{
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
}

#unity-canvas{
    width:100%;
    height:100%;
    display:block;
    background:#000;
    outline:none;
}

</style>

</head>

<body>

<div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
</div>

<script>

var canvas = document.querySelector("#unity-canvas");

var buildUrl = "Build";

var loaderUrl =
buildUrl + "/9e4c0029f1a984faa0f151100328293e.loader.js";

var config =
{
    arguments: [],

    dataUrl:
    buildUrl + "/6407da22cfbb29a7b8399c237d264852.data.unityweb",

    frameworkUrl:
    buildUrl + "/739e84563b41c627d2729d83354daf37.framework.js.unityweb",

    codeUrl:
    buildUrl + "/1a44bdad9a3855b21c3652f9cc787373.wasm.unityweb",

    streamingAssetsUrl:"StreamingAssets",

    companyName:"DefaultCompany",

    productName:"LilTazRunner",

    productVersion:"1.0",

    devicePixelRatio:1
};

function resizeCanvas()
{
    canvas.style.width = window.innerWidth + "px";
    canvas.style.height = window.innerHeight + "px";
}

window.addEventListener("resize", resizeCanvas);

resizeCanvas();

var script = document.createElement("script");

script.src = loaderUrl;

script.onload = function ()
{

    createUnityInstance(canvas, config)

    .then(function(unityInstance)
    {

        window.unityInstance = unityInstance;

        resizeCanvas();

        console.log("Unity Loaded");

    })

    .catch(function(message)
    {
        alert(message);
    });

};

document.body.appendChild(script);

</script>

</body>
</html>
